<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #1e1e1e;
            --bg2: #252526;
            --bg3: #2d2d2d;
            --border: #3a3a3a;
            --text: #d4d4d4;
            --text-muted: #888;
            --accent: #4fc3f7;
            --danger: #f48771;
            --btn-bg: #2d2d2d;
            --btn-hover: #3a3a3a;
            --btn-border: #4a4a4a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            font-family: system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden;
        }

        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 15px; border-bottom: 1px solid var(--border);
            background: var(--bg2); z-index: 10; flex-shrink: 0;
        }
        .group { display: flex; align-items: center; gap: 12px; }

        button, .btn-label {
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            padding: 5px 10px; cursor: pointer; border-radius: 4px;
            font-size: 13px; color: var(--text); outline: none;
        }
        button:hover, .btn-label:hover { background: var(--btn-hover); }

        #clear-btn { color: var(--danger); border-color: #5a3030; }

        label { color: var(--text); }
        input[type="checkbox"] { accent-color: var(--accent); }

        #find-bar {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg2); border-bottom: 1px solid var(--border);
            padding: 0 20px; height: 0; overflow: hidden; transition: height 0.3s ease;
        }
        #find-bar.open { height: 50px; }
        #find-bar input {
            border: 1px solid var(--btn-border); padding: 4px 8px;
            border-radius: 4px; font-size: 13px; width: 160px;
            background: var(--bg3); color: var(--text);
        }
        #find-bar input::placeholder { color: var(--text-muted); }

        main { flex: 1; display: flex; overflow: hidden; position: relative; width: 100%; }

        #editor-container { width: 50%; min-width: 100px; position: relative; background: var(--bg); overflow: hidden; }

        #resizer {
            width: 8px; cursor: col-resize;
            background: var(--bg2); border-left: 1px solid var(--border);
            border-right: 1px solid var(--border); z-index: 10;
        }
        #resizer:hover { background: var(--bg3); }

        #backdrop, #code {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; margin: 0;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 14px; line-height: 1.6;
            white-space: pre-wrap; word-wrap: break-word;
            border: none;
        }

        #code {
            background: transparent;
            color: #d4d4d4;
            z-index: 2; outline: none; resize: none; caret-color: #d4d4d4;
        }
        #code::placeholder { color: #555; }

        #backdrop {
            color: transparent !important;
            z-index: 1; pointer-events: none; overflow-y: auto;
            background: var(--bg);
        }

        mark { background-color: #6b5900; color: transparent; border-radius: 2px; }

        iframe { flex: 1; border: none; background: white; min-width: 100px; border-left: 1px solid var(--border); }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal {
            background: var(--bg2); padding: 20px; border-radius: 8px;
            width: 280px; border: 1px solid var(--border); color: var(--text);
        }
        .modal h3 { margin: 0 0 10px 0; color: var(--text); }
        .modal input, .modal select {
            background: var(--bg3); color: var(--text);
            border: 1px solid var(--btn-border); border-radius: 4px;
            width: 100%; padding: 8px; margin-bottom: 10px;
        }
        .modal select { margin-bottom: 15px; padding: 5px; }
        #confirm-export {
            background: var(--accent); color: #000; border: none;
            padding: 5px 10px; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <div class="group">
            <span style="font-weight: 800; color: var(--text);">HTML5 Tester</span>
            <label style="cursor:pointer; font-size: 13px;">
                <input type="checkbox" id="live-toggle" checked> Live Update
            </label>
            <button id="run-btn">Run Code</button>
            <button id="clear-btn">Clear</button>
            <label for="import-file" class="btn-label">Import</label>
            <input type="file" id="import-file" style="display:none;" accept=".html,.txt,.js,.css">
        </div>
        <div class="group">
            <button id="export-btn">Save File</button>
            <button id="tab-btn">View in Tab ↗</button>
        </div>
    </nav>

    <div id="find-bar">
        <input type="text" id="find-input" placeholder="Search code..." autocomplete="off">
        <input type="text" id="replace-input" placeholder="Replace with..." autocomplete="off">
        <button id="replace-btn">Replace All</button>
        <span id="find-count" style="font-size: 12px; color: var(--text-muted);">0 matches</span>
        <button onclick="closeFind()" style="border:none; background:none; font-size:20px; cursor:pointer; color: var(--text);">&times;</button>
    </div>

    <main id="container">
        <div id="editor-container">
            <div id="backdrop"></div>
            <textarea id="code" spellcheck="false" placeholder="Enter HTML here..."><h1>Hello World</h1>
<p>Created by CheddarOS</p></textarea>
        </div>

        <div id="resizer"></div>

        <iframe id="preview"></iframe>
    </main>

    <div id="modal-overlay">
        <div class="modal">
            <h3>Export File</h3>
            <input type="text" id="filename-input" value="index">
            <select id="extension-input">
                <option value=".html">HTML (.html)</option>
                <option value=".txt">Text (.txt)</option>
            </select>
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button onclick="closeModal()">Cancel</button>
                <button id="confirm-export">Download</button>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('code');
        const backdrop = document.getElementById('backdrop');
        const iframe = document.getElementById('preview');
        const liveToggle = document.getElementById('live-toggle');
        const findBar = document.getElementById('find-bar');
        const findInput = document.getElementById('find-input');
        const findCount = document.getElementById('find-count');
        const resizer = document.getElementById('resizer');
        const editorSide = document.getElementById('editor-container');

        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            iframe.style.pointerEvents = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = document.getElementById('container').offsetWidth;
            let newWidth = (e.clientX / containerWidth) * 100;
            if (newWidth > 5 && newWidth < 95) editorSide.style.width = `${newWidth}%`;
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
            iframe.style.pointerEvents = 'auto';
        });

        const updatePreview = () => {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open(); doc.write(textarea.value); doc.close();
        };

        function applyHighlights() {
            const term = findInput.value;
            let text = textarea.value;
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            if (term && findBar.classList.contains('open')) {
                const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(safeTerm, 'gi');
                text = text.replace(regex, '<mark>$&</mark>');
                const matches = textarea.value.match(regex);
                findCount.textContent = (matches ? matches.length : 0) + " matches";
            } else {
                findCount.textContent = "0 matches";
            }
            backdrop.innerHTML = text + '\n';
        }

        textarea.onscroll = () => { backdrop.scrollTop = textarea.scrollTop; };
        textarea.oninput = () => { if (liveToggle.checked) updatePreview(); applyHighlights(); };

        document.getElementById('run-btn').onclick = updatePreview;

        const openFind = () => { findBar.classList.add('open'); findInput.focus(); applyHighlights(); };
        const closeFind = () => { findBar.classList.remove('open'); applyHighlights(); textarea.focus(); };

        window.onkeydown = (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); openFind(); }
            if (e.key === 'Escape') closeFind();
        };

        findInput.oninput = applyHighlights;

        document.getElementById('replace-btn').onclick = () => {
            const findText = findInput.value;
            const replaceText = document.getElementById('replace-input').value;
            if (!findText) return;
            const regex = new RegExp(findText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            textarea.value = textarea.value.replace(regex, replaceText);
            applyHighlights(); updatePreview();
        };

        document.getElementById('import-file').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { textarea.value = e.target.result; updatePreview(); applyHighlights(); };
            reader.readAsText(file);
        };

        document.getElementById('clear-btn').onclick = () => {
            if (confirm("Delete all code?")) { textarea.value = ''; updatePreview(); applyHighlights(); }
        };

        document.getElementById('export-btn').onclick = () => document.getElementById('modal-overlay').style.display = 'flex';
        const closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

        document.getElementById('confirm-export').onclick = () => {
            const blob = new Blob([textarea.value], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = document.getElementById('filename-input').value + document.getElementById('extension-input').value;
            a.click(); closeModal();
        };

        document.getElementById('tab-btn').onclick = () => {
            const win = window.open('about:blank');
            win.document.write(textarea.value); win.document.close();
        };

        updatePreview(); applyHighlights();
    </script>
</body>
</html>
