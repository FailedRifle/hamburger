<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #1e1e1e;
            --bg2: #252526;
            --border: #3a3a3a;
            --text: #d4d4d4;
            --accent: #4fc3f7;
            --danger: #f48771;
        }

        body { margin: 0; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid var(--border); background: var(--bg2); z-index: 10; }
        .group { display: flex; align-items: center; gap: 10px; }
        
        button, select { 
            background: #333; border: 1px solid #444; padding: 5px 10px; 
            cursor: pointer; border-radius: 4px; font-size: 13px; color: var(--text); 
            outline: none;
        }
        button:hover { background: #444; }

        main { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        #editor-wrapper { position: relative; width: 50%; height: 100%; overflow: hidden; background: #1e1e1e; }
        
        #editing, #highlighting {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; margin: 0; border: 0;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px; line-height: 1.5;
            white-space: pre; overflow: auto; word-wrap: normal;
            box-sizing: border-box;
        }

        #editing {
            z-index: 1; background: transparent; color: transparent;
            caret-color: white; resize: none; outline: none;
        }

        #highlighting { z-index: 0; pointer-events: none; }
        
        pre[class*="language-"] { margin: 0 !important; padding: 20px !important; background: transparent !important; }
        code[class*="language-"] { font-family: inherit !important; font-size: inherit !important; line-height: inherit !important; }

        #resizer { width: 6px; cursor: col-resize; background: #2d2d2d; border: 1px solid var(--border); z-index: 5; }
        iframe { flex: 1; border: none; background: white; }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }

        .modal-content {
            background-color: var(--bg2);
            margin: 15% auto;
            padding: 20px;
            border: 1px solid var(--border);
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--text);
        }

        .close-button {
            color: var(--danger);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: none;
        }

        .modal-body input[type="text"],
        .modal-body select {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            background: #333;
            color: var(--text);
            border-radius: 4px;
            box-sizing: border-box;
        }

        .modal-footer {
            text-align: right;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .modal-footer button {
            margin-left: 10px;
        }
    </style>
</head>
<body>

<nav>
    <div class="group">
        <span style="font-weight: bold;">Cheddar IDE</span>
        <button id="run-btn">Run</button>
        <button id="clear-btn" style="color: var(--danger);">Clear</button>
        <button id="import-btn">Import</button>
        <button id="export-btn">Save File</button>
    </div>
    <div class="group">
        <label style="font-size: 12px; color: #888;">Mode:</label>
        <select id="lang-select">
            <option value="language-html">HTML5 (.html)</option>
            <option value="language-css">CSS (.css)</option>
            <option value="language-javascript">JS (.js)</option>
        </select>
        <button id="tab-btn">Open in Tab ↗</button>
    </div>
</nav>

<main id="container">
    <div id="editor-wrapper">
        <textarea id="editing" spellcheck="false" oninput="update(this.value); sync_scroll(this);" onscroll="sync_scroll(this);"><h1>Hello World</h1>
<p>Created by CheddarOS</p></textarea>
        <pre id="highlighting" aria-hidden="true"><code class="language-css" id="highlighting-content"></code></pre>
    </div>
    <div id="resizer"></div>
    <iframe id="preview"></iframe>
</main>

<div id="exportModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Save File</h3>
            <button class="close-button">&times;</button>
        </div>
        <div class="modal-body">
            <label for="fileName">File Name:</label>
            <input type="text" id="fileName" placeholder="my-file">
            <label for="fileType">File Type:</label>
            <select id="fileType">
                <option value="txt">Plain Text (.txt)</option>
                <option value="html">HTML (.html)</option>
                <option value="css">CSS (.css)</option>
                <option value="js">JavaScript (.js)</option>
            </select>
        </div>
        <div class="modal-footer">
            <button id="confirmExportBtn">Save</button>
            <button id="cancelExportBtn">Cancel</button>
        </div>
    </div>
</div>

<input type="file" id="importFileInput" style="display: none;">

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

<script>
    const editing = document.querySelector("#editing");
    const highlightingContent = document.querySelector("#highlighting-content");
    const highlightingRect = document.querySelector("#highlighting");
    const langSelect = document.querySelector("#lang-select");
    const iframe = document.getElementById('preview');

    const exportModal = document.getElementById('exportModal');
    const closeButton = exportModal.querySelector('.close-button');
    const cancelExportBtn = document.getElementById('cancelExportBtn');
    const confirmExportBtn = document.getElementById('confirmExportBtn');
    const fileNameInput = document.getElementById('fileName');
    const fileTypeSelect = document.getElementById('fileType');
    const importFileInput = document.getElementById('importFileInput');

    function update(text) {
        if(text[text.length-1] == "\n") text += " ";

        const mode = langSelect.value;
        highlightingContent.className = mode;
        highlightingContent.textContent = text;
        Prism.highlightElement(highlightingContent);

        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open(); 
        
        if (mode === "language-javascript") {
            doc.write(`<script>${text}<\/script>`);
        } else if (mode === "language-css") {
            doc.write(`<style>${text}</style><body><h1>CSS Preview Mode</h1></body>`);
        } else {
            doc.write(text);
        }
        doc.close();
    }

    function sync_scroll(element) {
        highlightingRect.scrollTop = element.scrollTop;
        highlightingRect.scrollLeft = element.scrollLeft;
    }

    let isResizing = false;
    const resizer = document.getElementById('resizer');
    const editorWrapper = document.getElementById('editor-wrapper');

    resizer.addEventListener('mousedown', () => { isResizing = true; iframe.style.pointerEvents = 'none'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let p = (e.clientX / window.innerWidth) * 100;
        if (p > 10 && p < 90) editorWrapper.style.width = p + '%';
    });
    document.addEventListener('mouseup', () => { isResizing = false; iframe.style.pointerEvents = 'auto'; });


    function openExportModal() {
        exportModal.style.display = 'block';

        const currentMode = langSelect.value;
        let defaultFileName = "untitled";
        let defaultFileType = "txt";

        switch (currentMode) {
            case "language-html":
                defaultFileName = "index";
                defaultFileType = "html";
                break;
            case "language-css":
                defaultFileName = "style";
                defaultFileType = "css";
                break;
            case "language-javascript":
                defaultFileName = "script";
                defaultFileType = "js";
                break;
        }
        
        fileNameInput.value = defaultFileName;
        for (let i = 0; i < fileTypeSelect.options.length; i++) {
            if (fileTypeSelect.options[i].value === defaultFileType) {
                fileTypeSelect.selectedIndex = i;
                break;
            }
        }
    }

    function closeExportModal() {
        exportModal.style.display = 'none';
    }

    function handleExport() {
        const fileName = fileNameInput.value || "untitled";
        const fileExtension = fileTypeSelect.value;
        const content = editing.value;
        
        const blob = new Blob([content], { type: `text/${fileExtension}` });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `${fileName}.${fileExtension}`;
        document.body.appendChild(a);
        a.click();
        
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        closeExportModal();
    }

    function handleImport() {
        importFileInput.click();
    }

    closeButton.onclick = closeExportModal;
    cancelExportBtn.onclick = closeExportModal;
    confirmExportBtn.onclick = handleExport;

    importFileInput.onchange = function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            editing.value = e.target.result;
            update(editing.value);
            const fileName = file.name;
            const extension = fileName.split('.').pop().toLowerCase();
            let newMode = "language-txt";

            switch (extension) {
                case 'html': newMode = 'language-html'; break;
                case 'css': newMode = 'language-css'; break;
                case 'js': newMode = 'language-javascript'; break;
            }
            langSelect.value = newMode;
            highlightingContent.className = newMode;
        };
        reader.readAsText(file);
        importFileInput.value = '';
    };

    langSelect.onchange = () => update(editing.value);
    document.getElementById('run-btn').onclick = () => update(editing.value);
    document.getElementById('clear-btn').onclick = () => { editing.value = ""; update(""); };
    document.getElementById('tab-btn').onclick = () => {
        const win = window.open();
        let content = editing.value;
        if (langSelect.value === "language-css") {
            content = `<!DOCTYPE html><html><head><style>${content}</style></head><body><h1>CSS Preview Mode</h1></body></html>`;
        } else if (langSelect.value === "language-javascript") {
            content = `<!DOCTYPE html><html><body><script>${content}<\/script></body></html>`;
        } else {
            content = `<!DOCTYPE html>${content}`;
        }
        win.document.write(content);
        win.document.close();
    };

    document.getElementById('import-btn').onclick = handleImport;
    document.getElementById('export-btn').onclick = openExportModal;


    update(editing.value);
</script>

</body>
</html>
