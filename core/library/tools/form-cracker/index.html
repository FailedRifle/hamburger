<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 20px;
    }
    textarea {
      width: 100%;
      height: 250px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 12px;
    }
    #stats {
      margin-top: 10px;
      color: #c00;
      white-space: pre-wrap;
    }
    .row {
      margin-top: 10px;
    }
    #viewsource-result {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #viewsource-result input[type="text"] {
      flex: 1;
      font-family: monospace;
      font-size: 12px;
      padding: 5px 7px;
      box-sizing: border-box;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #f5f5f5;
    }
    #copy-btn {
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #viewsource-instructions {
      margin-top: 6px;
      font-size: 13px;
      color: #333;
      background: #fffbe6;
      border: 1px solid #e6d800;
      border-radius: 4px;
      padding: 7px 10px;
    }
    #source-section {
      display: none;
    }
    #copy-confirm {
      font-size: 12px;
      color: green;
      margin-left: 4px;
    }
  </style>
  <script>
    function parseSource(source) {
      const match = source.match(/_docs_flag_initialData=(?<data>{[\s\S]*?});<\/script>/);

      if (!match || !match.groups || !match.groups.data) {
        throw new Error("Could not find _docs_flag_initialData block in the pasted source.");
      }

      const info_map = JSON.parse(match.groups.data);

      if (!info_map.info_params || !info_map.info_params.token) {
        throw new Error("Could not find info_params.token in parsed data.");
      }

      const token = info_map.info_params.token;

      let my_query_params = new URLSearchParams();
      if (info_map["docs-crq"]) {
        let url_search_params = new URLSearchParams(info_map["docs-crq"]);
        if (url_search_params.get("hr_submission")) {
          my_query_params.append("hr_submission", url_search_params.get("hr_submission"));
        }
      }

      if (!info_map["docs-crp"]) {
        throw new Error("Could not find docs-crp in parsed data.");
      }

      const url = "https://docs.google.com" + info_map["docs-crp"] +
        (my_query_params.toString() ? "?" + my_query_params.toString() : "");

      return { token: token, url: url };
    }

    window.addEventListener("load", () => {

      // --- Step 1: view-source link generator ---
      document.querySelector("#gen-viewsource-btn").addEventListener("click", () => {
        const raw = document.querySelector("#form_link_input").value.trim();
        if (!raw) {
          document.querySelector("#viewsource-instructions").textContent = "Paste a Google Form link first.";
          document.querySelector("#viewsource-instructions").style.display = "block";
          document.querySelector("#viewsource-result").style.display = "none";
          return;
        }

        // Strip any existing view-source: prefix just in case
        const clean = raw.replace(/^view-source:/i, "");
        const vsLink = "view-source:" + clean;

        document.querySelector("#viewsource-link-box").value = vsLink;
        document.querySelector("#viewsource-result").style.display = "flex";
        document.querySelector("#viewsource-instructions").style.display = "block";
        document.querySelector("#viewsource-instructions").innerHTML =
          "Open the link above in your browser, then <strong>Ctrl+A</strong> to select all, <strong>Ctrl+C</strong> to copy, then paste it in the box below.";

        // Reveal the source paste section
        document.querySelector("#source-section").style.display = "block";
        document.querySelector("#copy-confirm").textContent = "";
      });

      // Copy button
      document.querySelector("#copy-btn").addEventListener("click", () => {
        const box = document.querySelector("#viewsource-link-box");
        box.select();
        box.setSelectionRange(0, 99999);
        try {
          navigator.clipboard.writeText(box.value).then(() => {
            document.querySelector("#copy-confirm").textContent = "copied!";
            setTimeout(() => { document.querySelector("#copy-confirm").textContent = ""; }, 2000);
          });
        } catch {
          document.execCommand("copy");
          document.querySelector("#copy-confirm").textContent = "copied!";
          setTimeout(() => { document.querySelector("#copy-confirm").textContent = ""; }, 2000);
        }
      });

      // --- Step 2: crack the source ---
      document.querySelector("#yourthing").addEventListener("click", () => {
        const stats = document.querySelector("#stats");
        stats.textContent = "";

        try {
          const sourceText = document.querySelector("#form_source").value;
          if (!sourceText.trim()) {
            stats.textContent = "Please paste the full Google Form page source first.";
            return;
          }

          const source_info = parseSource(sourceText);

          document.querySelector("#token").value = source_info.token;
          document.querySelector("#greatest_form").setAttribute("action", source_info.url);

          stats.textContent = "Token and URL extracted. Submitting form in a new tab...";

          document.querySelector("#sub").click();
        } catch (e) {
          stats.textContent = e.toString();
          console.error(e);
        }
      });
    });
  </script>
</head>
<body>
  <h1>cheddar form cracker</h1>

  <div class="row">
    <label><strong>Step 1:</strong> Paste the Google Form link here:</label>
    <div style="display:flex;gap:8px;margin-top:6px;">
      <input type="text" id="form_link_input" placeholder="https://docs.google.com/forms/d/e/..." style="flex:1;font-family:monospace;font-size:12px;padding:5px 7px;border:1px solid #aaa;border-radius:3px;box-sizing:border-box;">
      <button id="gen-viewsource-btn">get view-source link</button>
    </div>
  </div>

  <div id="viewsource-result" style="display:none;">
    <input type="text" id="viewsource-link-box" readonly>
    <button id="copy-btn">copy</button>
    <span id="copy-confirm"></span>
  </div>

  <p id="viewsource-instructions" style="display:none;"></p>

  <div id="source-section">
    <div class="row">
      <label><strong>Step 2:</strong> Paste the full page source below:</label>
      <textarea id="form_source" placeholder="Paste Google Form page source here..."></textarea>
    </div>

    <div class="row">
      <button id="yourthing">unlock form</button>
    </div>

    <p id="stats"></p>
  </div>

  <form target="_blank" method="POST" id="greatest_form">
    <input type="hidden" name="token" id="token">
    <input type="hidden" name="tz_offset" value="120">
    <input type="submit" style="display: none;" value="Submit" id="sub">
  </form>
</body>
</html>
