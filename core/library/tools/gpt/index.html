<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cheddarGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg-color: #131314;
            --text-main: #e3e3e3;
            --text-secondary: #c4c7c5;
            --accent-blue: #a8c7fa;
            --input-bg: #1e1f20;
            --user-msg-bg: #282a2d;
            --border-color: #444746;
            --code-header: #2d2f31;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; height: 100vh; background: var(--bg-color); color: var(--text-main); overflow: hidden; }

        /* --- Gemini Layout & Chat Container --- */
        #main-content { height: 100%; display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; position: relative; }
        #chat-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 24px; scroll-behavior: smooth; opacity: 0; transition: opacity 0.5s ease; }
        body.active #chat-container { opacity: 1; }
        #chat-display { width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; padding-bottom: 150px; }

        /* --- Message Styling --- */
        .msg-wrapper { display: flex; width: 100%; }
        .msg-wrapper.user { justify-content: flex-end; }
        .msg { line-height: 1.6; font-size: 16px; max-width: 85%; overflow-wrap: break-word; color: var(--text-main); }
        .user .msg { background: var(--user-msg-bg); padding: 14px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }

        /* --- Gemini-Exact Markdown Formatting --- */
        .msg strong, .msg b { color: #ffffff; font-weight: 600; }
        .msg p { margin-bottom: 16px; }
        .msg ul, .msg ol { margin: 8px 0 16px 28px; }
        .msg li { margin-bottom: 8px; padding-left: 4px; }
        .msg li::marker { color: var(--accent-blue); font-weight: bold; }
        .msg h1, .msg h2, .msg h3 { margin: 24px 0 12px 0; color: #ffffff; font-weight: 500; }
        .msg h1 { font-size: 22px; } .msg h2 { font-size: 20px; } .msg h3 { font-size: 18px; }
        
        .msg table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 14px; }
        .msg th, .msg td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
        .msg th { background: rgba(255,255,255,0.05); color: var(--accent-blue); }

        /* Inline code snippets */
        .msg :not(pre) > code {
            background: rgba(255,255,255,0.1);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }

        /* Full Code Blocks */
        .code-container { margin: 16px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background: #000; }
        .code-header { background: var(--code-header); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 12px; color: var(--text-secondary); }
        .copy-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }

        /* --- UI Elements & Animation --- */
        footer { position: absolute; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); z-index: 10; }
        body.active footer { top: 90%; }
        .greeting-container { width: 100%; max-width: 800px; margin-bottom: 12px; transition: opacity 0.3s; }
        body.active .greeting-container { opacity: 0; pointer-events: none; height: 0; margin: 0; }
        .hello-text { font-size: 44px; font-weight: 500; color: #ffffff; }

        .input-container { width: 100%; max-width: 800px; background: var(--input-bg); border-radius: 28px; border: 1px solid var(--border-color); }
        #input-preview-area { display: none; padding: 16px 16px 0; }
        .text-area-row { display: flex; align-items: flex-end; gap: 8px; padding: 12px 16px; }
        textarea { flex: 1; border: none; background: transparent; outline: none; padding: 8px 0; font-size: 16px; resize: none; max-height: 180px; color: var(--text-main); font-family: inherit; }
        .action-btn { background: transparent; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }

        .chat-sent-img { width: 150px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .streaming::after { content: ' 🧀'; animation: blink 1s infinite; color: var(--accent-blue); }
        @keyframes blink { 50% { opacity: 0; } }
        body.busy .action-btn, body.busy textarea { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="main-content">
        <div id="chat-container">
            <div id="chat-display"></div>
        </div>

        <footer>
            <div class="greeting-container">
                <div class="hello-text">🧀 Hello, Cheddar</div>
                <div style="color: var(--text-secondary); font-size: 18px; margin-top: 4px;">What can I help you with?</div>
            </div>
            
            <div class="input-container">
                <div id="input-preview-area"></div>
                <div class="text-area-row">
                    <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">
                    <button class="action-btn" onclick="document.getElementById('file-input').click()">＋</button>
                    <textarea id="user-prompt" placeholder="Message cheddarGPT" rows="1"></textarea>
                    <button id="run-btn" class="action-btn" onclick="handleSend()" style="color: var(--accent-blue); font-weight: bold;">➤</button>
                </div>
            </div>
            <div style="display: flex; gap: 15px; margin-top: 12px;">
                <div id="version-tag" style="font-size: 11px; color: #8e918f;">cheddarGPT v3.3 - Stable</div>
                <div onclick="location.reload()" style="font-size: 11px; color: var(--accent-blue); cursor: pointer;">Clear Chat</div>
            </div>
        </footer>
    </div>

    <script>
        const API_KEY = "AIzaSyD1xJ2yu6vQ0c6Yk5dozIqh_57QiWG7JgU"; 
        const MODEL_ID = "gemini-2.5-flash-lite";      // models [gemini-2.5-flash-lite], [gemini-2.5-pro]
        const DEBUG_MODE = false; 

        const chatDisplay = document.getElementById('chat-display');
        const promptInput = document.getElementById('user-prompt');
        const previewArea = document.getElementById('input-preview-area');
        
        let currentAttachment = null;
        let isFirstMessage = true;
        let isGenerating = false;

        const renderer = new marked.Renderer();
        renderer.code = function(args) {
            const code = args.text || "";
            const lang = args.lang || "text";
            const escapedCode = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            return `<div class="code-container"><div class="code-header"><span>${lang}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code class="hljs language-${lang}">${escapedCode}</code></pre></div>`;
        };
        marked.setOptions({ renderer: renderer, breaks: true });

        window.copyCode = (btn) => {
            const code = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        };

        async function handleSend() {
            const text = promptInput.value.trim();
            if ((!text && !currentAttachment) || isGenerating) return;

            isGenerating = true;
            document.body.classList.add('busy');

            if (isFirstMessage) {
                document.body.classList.add('active');
                isFirstMessage = false;
            }

            const userMsgDiv = createMessageElement(text, 'user');
            if (currentAttachment && currentAttachment.isImage) {
                userMsgDiv.innerHTML = `<img src="${currentAttachment.src}" class="chat-sent-img"><br>` + userMsgDiv.innerHTML;
            }

            const savedAttachment = currentAttachment;
            clearAttachment();
            promptInput.value = '';
            promptInput.style.height = 'auto';

            const botMsgDiv = createMessageElement('', 'bot');
            botMsgDiv.classList.add('streaming');

if (DEBUG_MODE) {
    botMsgDiv.innerHTML = ""; // Clear any leftover markdown artifacts
    await simulateStreaming("## 🧀 Debug Mode Active\nThis is a simulated response to test your UI without spending credits.", botMsgDiv);
} else {
    await callAPI(text, savedAttachment, botMsgDiv);
}

            botMsgDiv.classList.remove('streaming'); 
            isGenerating = false;
            document.body.classList.remove('busy');
        }

        async function callAPI(text, attachment, botMsgDiv) {
            const parts = [];
            if (text) parts.push({ text: text });
            if (attachment) parts.push({ inline_data: { mime_type: attachment.mime_type, data: attachment.data } });
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:streamGenerateContent?alt=sse&key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }] })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                                    fullText += data.candidates[0].content.parts[0].text;
                                    botMsgDiv.innerHTML = marked.parse(fullText);
                                    botMsgDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                                    scrollToBottom();
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch (err) {
                botMsgDiv.innerHTML = `<span style="color: #ff6b6b;">Connection Error: ${err.message}</span>`;
            }
        }

async function simulateStreaming(content, element) {
    let currentText = "";
    for (let i = 0; i < content.length; i++) {
        currentText += content[i];
        // This ensures the markdown is re-parsed every character
        element.innerHTML = marked.parse(currentText); 
        
        // Highlight code if any exists in your debug string
        element.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        
        scrollToBottom();
        await new Promise(r => setTimeout(r, 30)); // Slightly slower (30ms) is better for testing
    }
}

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentAttachment = { 
                    mime_type: file.type, 
                    data: e.target.result.split(',')[1], 
                    src: e.target.result, 
                    isImage: file.type.startsWith('image/') 
                };
                previewArea.innerHTML = `<div style="padding:10px; color:var(--accent-blue)">📎 ${file.name} attached</div>`;
                previewArea.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function clearAttachment() {
            previewArea.style.display = 'none';
            currentAttachment = null;
        }

        function createMessageElement(text, type) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${type}`;
            const displayContent = type === 'user' ? text : marked.parse(text);
            wrapper.innerHTML = `<div class="msg"><div>${displayContent}</div></div>`;
            chatDisplay.appendChild(wrapper);
            scrollToBottom();
            return wrapper.querySelector('.msg div');
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        promptInput.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                handleSend(); 
            } 
        });

        promptInput.addEventListener('input', function() { 
            this.style.height = 'auto'; 
            this.style.height = (this.scrollHeight) + 'px'; 
        });
    </script>
</body>
</html>
