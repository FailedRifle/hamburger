<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2</title>
  <link rel="manifest" href="/hamburger/core/scripts/manifest.json">
  <meta name="theme-color" content="#000000">
</head>
<body>
  <div id="browser-block" style="display:none; text-align:center; margin-top:20%;">
    <h1>🚫 You cannot preview this page</h1>
    <p>Download the app to access this content.</p>
  </div>

  <div id="pwa-content" style="display:none;"></div>

  <script>
    if (window.matchMedia('(display-mode: standalone)').matches) {
      fetch('/hamburger/core/library/index.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('pwa-content').style.display = 'block';
          document.getElementById('pwa-content').innerHTML = html;
        })
        .catch(() => {
          document.getElementById('pwa-content').style.display = 'block';
          document.getElementById('pwa-content').innerHTML = '<p>Failed to load content.</p>';
        });
    } else {
      document.getElementById('browser-block').style.display = 'block';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/hamburger/core/service-worker.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW failed:', err));
    }
  </script>
</body>
</html>
