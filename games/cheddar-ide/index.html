<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Tester</title>
    <style>
        :root { --bg: #ffffff; --border: #e0e0e0; --text: #000000; --accent: #007acc; --danger: #d32f2f; }
        
        * { box-sizing: border-box; }
        
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; font-family: system-ui, sans-serif; background: var(--bg); overflow: hidden; }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid var(--border); background: #fafafa; z-index: 10; flex-shrink: 0; }
        .group { display: flex; align-items: center; gap: 12px; }
        button, .btn-label { background: white; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 13px; color: #333; outline: none; }
        button:hover, .btn-label:hover { background: #f0f0f0; }
        
        #clear-btn { color: var(--danger); border-color: #ffcdd2; }

        #find-bar { 
            display: flex; align-items: center; gap: 10px; background: #fff; 
            border-bottom: 1px solid var(--border); padding: 0 20px; height: 0; 
            overflow: hidden; transition: height 0.3s ease;
        }
        #find-bar.open { height: 50px; }
        #find-bar input { border: 1px solid #ddd; padding: 4px 8px; border-radius: 4px; font-size: 13px; width: 160px; }

        /* Layout */
        main { flex: 1; display: flex; overflow: hidden; position: relative; width: 100%; }
        
        #editor-container { width: 50%; min-width: 100px; position: relative; background: #fff; overflow: hidden; }

        /* Resizer Gutter */
        #resizer { width: 8px; cursor: col-resize; background: #f1f1f1; border-left: 1px solid var(--border); border-right: 1px solid var(--border); z-index: 10; }
        #resizer:hover { background: #e0e0e0; }

        /* The Secret to the Highlighter: Identical Text Properties */
        #backdrop, #code {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; margin: 0;
            font-family: "SFMono-Regular", Consolas, monospace; 
            font-size: 14px; line-height: 1.6; 
            white-space: pre-wrap; word-wrap: break-word;
            border: none;
        }

        /* Top Layer: Actual editable text (Always Black) */
        #code { 
            background: transparent; 
            color: #000000; /* Force text to be black */
            z-index: 2; 
            outline: none; 
            resize: none; 
            caret-color: #000; 
        }

        /* Bottom Layer: Highlights (Text is ALWAYS Transparent) */
        #backdrop { 
            color: transparent !important; 
            z-index: 1; 
            pointer-events: none; 
            overflow-y: auto; 
            background: white;
        }

        /* The highlight box itself */
        mark { background-color: #ffeb3b; color: transparent; border-radius: 2px; }

        iframe { flex: 1; border: none; background: white; min-width: 100px; }

        /* Export Modal */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: white; padding: 20px; border-radius: 8px; width: 280px; }
    </style>
</head>
<body>

    <nav>
        <div class="group">
            <span style="font-weight: 800;">HTML5 Tester</span>
            <label style="cursor:pointer; font-size: 13px;"><input type="checkbox" id="live-toggle" checked> Live Update</label>
            <button id="run-btn">Run Code</button>
            <button id="clear-btn">Clear</button>
            <label for="import-file" class="btn-label">Import</label>
            <input type="file" id="import-file" style="display:none;" accept=".html,.txt,.js,.css">
        </div>
        <div class="group">
            <button id="export-btn">Save File</button>
            <button id="tab-btn">View in Tab ↗</button>
        </div>
    </nav>

    <div id="find-bar">
        <input type="text" id="find-input" placeholder="Search code..." autocomplete="off">
        <input type="text" id="replace-input" placeholder="Replace with..." autocomplete="off">
        <button id="replace-btn">Replace All</button>
        <span id="find-count" style="font-size: 12px; color: #666;">0 matches</span>
        <button onclick="closeFind()" style="border:none; background:none; font-size:20px; cursor:pointer;">&times;</button>
    </div>

    <main id="container">
        <div id="editor-container">
            <div id="backdrop"></div>
            <textarea id="code" spellcheck="false" placeholder="Enter HTML here..."><h1>Hello World</h1>
<p>Created by CheddarOS</p></textarea>
        </div>
        
        <div id="resizer"></div>

        <iframe id="preview"></iframe>
    </main>

    <div id="modal-overlay">
        <div class="modal">
            <h3 style="margin:0 0 10px 0">Export File</h3>
            <input type="text" id="filename-input" value="index" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd; border-radius:4px;">
            <select id="extension-input" style="width:100%; margin-bottom:15px; padding: 5px;">
                <option value=".html">HTML (.html)</option>
                <option value=".txt">Text (.txt)</option>
            </select>
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button onclick="closeModal()">Cancel</button>
                <button id="confirm-export" style="background:var(--accent); color:white; border:none;">Download</button>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('code');
        const backdrop = document.getElementById('backdrop');
        const iframe = document.getElementById('preview');
        const liveToggle = document.getElementById('live-toggle');
        const findBar = document.getElementById('find-bar');
        const findInput = document.getElementById('find-input');
        const findCount = document.getElementById('find-count');
        const resizer = document.getElementById('resizer');
        const editorSide = document.getElementById('editor-container');

        // --- 1. Resizer Logic ---
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            iframe.style.pointerEvents = 'none'; // Prevents iframe from eating mouse events
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = document.getElementById('container').offsetWidth;
            let newWidth = (e.clientX / containerWidth) * 100;
            if (newWidth > 5 && newWidth < 95) {
                editorSide.style.width = `${newWidth}%`;
            }
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
            iframe.style.pointerEvents = 'auto';
        });

        // --- 2. Preview Engine ---
        const updatePreview = () => {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open(); 
            doc.write(textarea.value); 
            doc.close();
        };

        // --- 3. Highlighter Engine ---
        function applyHighlights() {
            const term = findInput.value;
            let text = textarea.value;

            // We escape HTML special characters in the backdrop so code looks like code
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            if (term && findBar.classList.contains('open')) {
                const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(safeTerm, 'gi');
                text = text.replace(regex, '<mark>$&</mark>');
                const matches = textarea.value.match(regex);
                findCount.textContent = (matches ? matches.length : 0) + " matches";
            } else {
                findCount.textContent = "0 matches";
            }

            backdrop.innerHTML = text + '\n';
        }

        // --- 4. Event Listeners ---
        textarea.onscroll = () => { backdrop.scrollTop = textarea.scrollTop; };
        textarea.oninput = () => {
            if (liveToggle.checked) updatePreview();
            applyHighlights();
        };

        document.getElementById('run-btn').onclick = updatePreview;

        // Find/Replace Toggle
        const openFind = () => { findBar.classList.add('open'); findInput.focus(); applyHighlights(); };
        const closeFind = () => { findBar.classList.remove('open'); applyHighlights(); textarea.focus(); };

        window.onkeydown = (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); openFind(); }
            if (e.key === 'Escape') closeFind();
        };

        findInput.oninput = applyHighlights;

        document.getElementById('replace-btn').onclick = () => {
            const findText = findInput.value;
            const replaceText = document.getElementById('replace-input').value;
            if (!findText) return;
            const regex = new RegExp(findText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            textarea.value = textarea.value.replace(regex, replaceText);
            applyHighlights();
            updatePreview();
        };

        // Import/Export
        document.getElementById('import-file').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                textarea.value = e.target.result;
                updatePreview();
                applyHighlights();
            };
            reader.readAsText(file);
        };

        document.getElementById('clear-btn').onclick = () => {
            if (confirm("Delete all code?")) {
                textarea.value = '';
                updatePreview();
                applyHighlights();
            }
        };

        document.getElementById('export-btn').onclick = () => document.getElementById('modal-overlay').style.display = 'flex';
        const closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
        
        document.getElementById('confirm-export').onclick = () => {
            const blob = new Blob([textarea.value], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = document.getElementById('filename-input').value + document.getElementById('extension-input').value;
            a.click();
            closeModal();
        };

        document.getElementById('tab-btn').onclick = () => {
            const win = window.open('about:blank');
            win.document.write(textarea.value);
            win.document.close();
        };

        // Initial Boot
        updatePreview();
        applyHighlights();
    </script>
</body>
</html>
