<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <title>geometry dash</title>
    <style>
        body {
            margin: 0;
            background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        #loader {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: black;
            z-index: 10;
        }

        .progress {
            width: 50%;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            margin-top: 20px;
        }

        .full {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transform: scaleX(0);
            transform-origin: left;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress">
            <div class="full" id="progressBar"></div>
        </div>
    </div>

    <div id="gameContainer"></div>

    <script src="https://rawcdn.githack.com/genizy/google-class/main/gdlite/Build/UnityLoader.js"></script>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer", 
            "https://rawcdn.githack.com/genizy/google-class/main/gdlite/Build/GeometryDashLite.json", 
            { onProgress: UnityProgress }
        );

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            
            const loader = document.querySelector("#loader");
            const progressBar = document.querySelector("#progressBar");
            
            // Update the bar scale based on progress (0 to 1)
            progressBar.style.transform = "scaleX(" + progress + ")";
            
            // Hide loader when finished
            if (progress === 1) {
                setTimeout(() => {
                    loader.style.display = "none";
                }, 1500);
            }
        }
    </script>
</body>
</html>
