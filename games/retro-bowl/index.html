<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/assets@main/retro-bowl/">
    <meta charset="utf-8">
    <title>retro bowl</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas id="canvas" width="960" height="540"></canvas>
    </div>

    <script src="html5game/RetroBowl.js"></script>

    <script>
        function start() {
            // Check if the GameMaker engine is ready
            if (typeof GameMaker_Init === "function") {
                GameMaker_Init();
            } else {
                // Retry every 50ms if not loaded yet
                setTimeout(start, 50);
            }
        }
        start();
    </script>
</body>
</html>
