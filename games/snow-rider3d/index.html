<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="https://cdn.jsdelivr.net/gh/failedrifle/snowrider3D/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snow rider 3D</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .webgl-content {
            width: 100%;
            height: 100%;
            display: flex;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            margin: auto;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/failedrifle/snowrider3D/TemplateData/style.css">
    <script src="https://cdn.jsdelivr.net/gh/failedrifle/snowrider3D/TemplateData/UnityProgress.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/failedrifle/snowrider3D/Build/UnityLoader.js"></script>
</head>
<body>

    <div class="webgl-content">
        <div id="gameContainer"></div>
    </div>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer", 
            "https://cdn.jsdelivr.net/gh/failedrifle/snowrider3D/Build/SnowRider3D-gd-1.json", 
            {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function() {
                        UnityProgress(gameInstance, "complete");
                    }
                }
            }
        );
    </script>
</body>
</html>
